; Process optimization for shared hosting (CloudLinux LVE limits)
; Reduces PHP process count by capping execution time and memory

max_execution_time = 60
max_input_time = 30
memory_limit = 128M
output_buffering = On
zlib.output_compression = Off

; Reduce persistent connections that hold process slots
mysql.allow_persistent = Off
mysqli.allow_persistent = Off
pdo_mysql.cache_size = 0

; Disable unused extensions that spawn child processes
; (host-level only - these are hints, shared host may ignore some)
session.gc_probability = 1
session.gc_divisor = 1000
session.gc_maxlifetime = 14400
