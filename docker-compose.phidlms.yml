version: "3.8"

services:
  phidlms-db:
    image: mariadb:11
    container_name: phidlms-db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: PhidLMS@Root2026!
      MARIADB_DATABASE: phidlms_db
      MARIADB_USER: phidlms
      MARIADB_PASSWORD: PhidLMS@DB2026!
    volumes:
      - phidlms_mariadb_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3307:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  phidlms-redis:
    image: redis:7-alpine
    container_name: phidlms-redis
    restart: always
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - phidlms_redis_data:/data

volumes:
  phidlms_mariadb_data:
    name: phidlms_mariadb_data
  phidlms_redis_data:
    name: phidlms_redis_data
